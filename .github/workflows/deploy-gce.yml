name: Deploy to Google Compute Engine

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "frontend/**"
      - "deploy/**"
      - "docker-compose.prod.yml"
      - ".github/workflows/deploy-gce.yml"
  workflow_dispatch:

env:
  PROJECT_ID: intense-glow-498418-f8
  RELEASE_ARCHIVE: rescateya-release.tar.gz
  REMOTE_RELEASE_ARCHIVE: /tmp/rescateya-release-${{ github.sha }}.tar.gz
  REMOTE_ENV_FILE: /tmp/rescateya-${{ github.sha }}.env.production
  REMOTE_FIREBASE_CREDENTIALS_FILE: /tmp/rescateya-firebase-${{ github.sha }}.json

jobs:
  deploy:
    name: Deploy RescateYa
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Create deployment environment file
        run: |
          cat > .env.production <<'EOF'
          POSTGRES_DB=rescateya
          POSTGRES_USER=rescateya
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          ACCESS_TOKEN_EXPIRE_MINUTES=1440
          GOOGLE_CLOUD_PROJECT=${{ env.PROJECT_ID }}
          GOOGLE_CLOUD_LOCATION=${{ vars.GOOGLE_CLOUD_LOCATION || 'us-central1' }}
          GEMINI_MODEL=${{ vars.GEMINI_MODEL || 'gemini-2.0-flash' }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_REPORTS=${{ secrets.GEMINI_API_KEY_REPORTS }}
          FIREBASE_CREDENTIALS_PATH=/run/secrets/firebase-credentials.json
          OPENAI_API_KEY=
          EOF

      - name: Create Firebase credentials file
        run: |
          cat > firebase-credentials.json <<'EOF'
          ${{ secrets.FIREBASE_CREDENTIALS_JSON || secrets.GCP_SA_KEY }}
          EOF

      - name: Package application
        run: |
          tar \
            --exclude='.git' \
            --exclude='backend/.env' \
            --exclude='backend/.venv' \
            --exclude='backend/uploads' \
            --exclude='frontend/node_modules' \
            --exclude='frontend/dist' \
            --exclude='mobile' \
            -czf "$RELEASE_ARCHIVE" \
            backend frontend deploy docker-compose.prod.yml

      - name: Copy release to Compute Engine
        run: |
          gcloud compute scp "$RELEASE_ARCHIVE" \
            "${{ secrets.GCE_INSTANCE }}:$REMOTE_RELEASE_ARCHIVE" \
            --zone "${{ secrets.GCE_ZONE }}" \
            --project "$PROJECT_ID" \
            --quiet
          gcloud compute scp .env.production \
            "${{ secrets.GCE_INSTANCE }}:$REMOTE_ENV_FILE" \
            --zone "${{ secrets.GCE_ZONE }}" \
            --project "$PROJECT_ID" \
            --quiet
          gcloud compute scp firebase-credentials.json \
            "${{ secrets.GCE_INSTANCE }}:$REMOTE_FIREBASE_CREDENTIALS_FILE" \
            --zone "${{ secrets.GCE_ZONE }}" \
            --project "$PROJECT_ID" \
            --quiet

      - name: Deploy on Compute Engine
        run: |
          gcloud compute ssh "${{ secrets.GCE_INSTANCE }}" \
            --zone "${{ secrets.GCE_ZONE }}" \
            --project "$PROJECT_ID" \
            --quiet \
            --command '
              set -euo pipefail
              sudo mkdir -p /opt/rescateya
              sudo rm -rf /opt/rescateya/backend /opt/rescateya/frontend /opt/rescateya/deploy /opt/rescateya/docker-compose.prod.yml
              sudo tar -xzf '${REMOTE_RELEASE_ARCHIVE}' -C /opt/rescateya
              sudo mv '${REMOTE_ENV_FILE}' /opt/rescateya/.env.production
              sudo mkdir -p /opt/rescateya/secrets
              sudo mv '${REMOTE_FIREBASE_CREDENTIALS_FILE}' /opt/rescateya/secrets/firebase-credentials.json
              sudo chmod 600 /opt/rescateya/secrets/firebase-credentials.json
              rm -f '${REMOTE_RELEASE_ARCHIVE}'
              sudo chown -R $USER:$USER /opt/rescateya
              cd /opt/rescateya
              sudo docker compose --env-file .env.production -f docker-compose.prod.yml up -d --build
              sudo docker image prune -f
              sudo docker compose --env-file .env.production -f docker-compose.prod.yml ps
            '
