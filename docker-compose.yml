version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: emergencias_db
    environment:
      POSTGRES_DB: emergencias_vehiculares
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: emergencias_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/emergencias_vehiculares
      SECRET_KEY: super-secret-key-cambiar
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      - db
    volumes:
      - ./backend:/app
      - ./backend/uploads:/app/uploads

volumes:
  postgres_data:
