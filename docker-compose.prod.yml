services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rescateya}
      POSTGRES_USER: ${POSTGRES_USER:-rescateya}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD requerido}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-rescateya}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD requerido}@db:5432/${POSTGRES_DB:-rescateya}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY requerido}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT:-intense-glow-498418-f8}
      GOOGLE_CLOUD_LOCATION: ${GOOGLE_CLOUD_LOCATION:-us-central1}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_API_KEY_REPORTS: ${GEMINI_API_KEY_REPORTS:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      UPLOAD_DIR: /app/uploads
      FIREBASE_CREDENTIALS_PATH: ${FIREBASE_CREDENTIALS_PATH:-/run/secrets/firebase-credentials.json}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - uploads_data:/app/uploads
      - ./secrets/firebase-credentials.json:/run/secrets/firebase-credentials.json:ro
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)\""]
      interval: 30s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started

volumes:
  postgres_data:
  uploads_data:
  caddy_data:
  caddy_config:
